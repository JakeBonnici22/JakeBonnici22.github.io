<!doctype html>
<html lang="en" data-theme="{{ site.site_theme | default: ‘graphite’ }}">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="canonical" href="{{ page.url | replace:’index.html’,’’ | absolute_url }}" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ page.title | default: site.title }}" />
    <meta property="og:description" content="{{ site.description }}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ page.title | default: site.title }}" />
    <meta name="twitter:description" content="{{ site.description }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="/">{{ site.title }}</a>
        <nav class="nav-links">
          <a href="/#projects">Projects</a>
          <a href="/#experience">Experience</a>
          <a href="/#education">Education</a>
          <a href="/#research">Research</a>
          <a href="/#life">Life</a>
          <a href="/#contact">Contact</a>
        </nav>
        <div class="nav-actions">
          <button id="theme-toggle" class="theme-toggle" aria-label="Switch theme">Theme</button>
        </div>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <p class="footer-title">Let’s build something useful.</p>
          <p class="muted">{{ site.location }} &middot; <a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
        </div>
        <div class="footer-links">
          <a href="mailto:{{ site.email }}">Email</a>
          <a href="{{ site.github }}" target="_blank" rel="noreferrer">GitHub</a>
          <a href="{{ site.linkedin }}" target="_blank" rel="noreferrer">LinkedIn</a>
          <span class="muted footer-year"></span>
        </div>
      </div>
    </footer>
    <button class="scroll-top" id="scroll-top" aria-label="Scroll to top">↑</button>
    <script src="/js/site.js"></script>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const theme = params.get("theme");
        if (theme) document.documentElement.setAttribute("data-theme", theme);
        const yearEl = document.querySelector(".footer-year");
        if (yearEl) yearEl.textContent = `© ${new Date().getFullYear()}`;
      })();
    </script>
  </body>
</html>
